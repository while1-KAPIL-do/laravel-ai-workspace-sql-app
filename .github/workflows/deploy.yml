name: Deploy Laravel Docker

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "⏳ Waiting for EC2 to be fully ready..."
            sleep 60
            cd laravel-ai-workspace-sql-app

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐳 Building & updating containers (NO DOWN)..."
            docker compose --env-file .env -f docker-compose.prod.yml up -d --build

            echo "⏳ Waiting for MySQL..."
            for i in {1..30}; do
              docker exec laravel_ai_mysql mysqladmin ping -h"localhost" --silent && break
              echo "Waiting for MySQL... ($i)"
              sleep 2
            done

            echo "🧹 Clearing Laravel cache..."
            docker exec sql_ai_app php artisan config:clear
            docker exec sql_ai_app php artisan cache:clear
            docker exec sql_ai_app php artisan route:clear

            echo "🚀 Running migrations..."
            docker exec sql_ai_app php artisan migrate --force

            echo "✅ Deployment completed!"