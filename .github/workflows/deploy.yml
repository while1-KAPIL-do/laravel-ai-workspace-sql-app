name: Deploy Laravel Docker

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Start EC2 if stopped
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Wait for EC2 to be running
        run: |
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Get EC2 Public IP
        id: ec2-ip
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2-ip.outputs.ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            echo "⏳ Waiting for EC2 to be fully ready..."
            sleep 60
            cd laravel-ai-workspace-sql-app

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🗑️ Removing old app image to force fresh build..."
            docker rmi sql_ai_app:latest || true   # forces Docker to rebuild from scratch
            # docker rmi llm-service:latest || true  # llm-service rarely changes

            echo "🐳 Building & updating containers..."
            docker compose --env-file .env -f docker-compose.prod.yml up -d --build

            echo "⏳ Waiting for MySQL..."
            for i in {1..60}; do
              docker exec laravel_ai_mysql mysqladmin ping -h"localhost" --silent && break
              echo "Waiting for MySQL... ($i)"
              sleep 2
            done

            echo "🧹 Clearing Laravel cache..."
            docker exec sql_ai_app php artisan optimize:clear

            echo "🚀 Running migrations..."
            docker exec sql_ai_app php artisan migrate --force

            echo "⚡ Caching config & routes..."
            docker exec sql_ai_app php artisan optimize

            echo "🧹 Pruning ALL unused Docker resources..."
            docker image prune -af   # ← -a removes ALL unused images, not just dangling
            docker volume prune -f   # ← removes volumes not attached to any container
            docker container prune -f

            echo "✅ Deployment completed!"