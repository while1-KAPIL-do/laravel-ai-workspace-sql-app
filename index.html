<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching App...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">

<div class="text-center max-w-md px-6">

    <div id="spinner"
         class="w-16 h-16 border-4 border-slate-700 border-t-cyan-400
                rounded-full animate-spin mx-auto mb-8"></div>

    <h1 class="text-2xl font-bold mb-2" id="title">Starting server...</h1>
    <p class="text-slate-400 mb-6">
        This app runs on a sleeping server.<br>
        It will wake up in ~20 seconds.
    </p>

    <div class="text-5xl font-mono font-bold text-cyan-400 mb-6"
         id="countdown">20</div>

    <div class="w-full bg-slate-800 rounded-full h-2 mb-8">
        <div id="progress"
             class="bg-cyan-400 h-2 rounded-full transition-all duration-1000"
             style="width: 0%"></div>
    </div>

    <p class="text-xs text-slate-500" id="statusText">Connecting...</p>
</div>

<script>
const LAMBDA_URL = 'https://tinyurl.com/y5fxzy2j';
const HEALTH_URL = 'https://www.kapillabs.com/health';
const APP_URL    = 'https://www.kapillabs.com/ai/sql-assitance';
const TOTAL_SECS = 20;

let secondsLeft = TOTAL_SECS;
let redirecting  = false;

function redirect() {
    if (redirecting) return;
    redirecting = true;
    document.getElementById('title').textContent      = 'Ready 🚀';
    document.getElementById('statusText').textContent = 'Redirecting...';
    document.getElementById('progress').style.width   = '100%';
    window.location.href = APP_URL;
}

// ─── Health check using no-cors (opaque response) ────────────────────────────
// With no-cors we can't read the body — but if the request doesn't throw,
// the server is up and responding. That's enough to redirect.
function pollHealth(label) {
    let attempt = 0;

    const poll = setInterval(async () => {
        attempt++;
        document.getElementById('statusText').textContent =
            `${label} (attempt ${attempt})...`;
        try {
            const res = await fetch(HEALTH_URL, { cache: 'no-store' }); // no mode:'no-cors'
            const data = await res.json();
            if (res.ok && data.status === 'ok') {  // res.ok = true only on 200, not 503
                clearInterval(poll);
                redirect();
            }
        } catch {
            // fetch threw = server still not reachable, keep polling
        }
    }, 2000);

    return poll;
}

// ─── Step 1: Trigger Lambda ──────────────────────────────────────────────────
async function startServer() {
    try {
        const res  = await fetch(LAMBDA_URL);
        const data = await res.json();

        document.getElementById('statusText').textContent = `EC2: ${data.status}`;

        if (data.status === 'running') {
            document.getElementById('title').textContent     = 'Checking service...';
            document.getElementById('countdown').textContent = '⚡';
            pollHealth('Quick check');
        } else {
            startCountdown();
        }

    } catch (e) {
        document.getElementById('statusText').textContent = 'Lambda error (check CORS)';
    }
}

// ─── Step 2: Countdown (cosmetic) + health polling in parallel ───────────────
function startCountdown() {
    secondsLeft = TOTAL_SECS;

    pollHealth('Checking'); // start health polling immediately, don't wait for countdown

    const tickInterval = setInterval(() => {
        secondsLeft--;
        document.getElementById('countdown').textContent = secondsLeft;
        document.getElementById('progress').style.width  =
            ((TOTAL_SECS - secondsLeft) / TOTAL_SECS) * 100 + '%';

        if (secondsLeft <= 0) {
            clearInterval(tickInterval);
            document.getElementById('title').textContent     = 'Almost ready...';
            document.getElementById('countdown').textContent = '⏳';
        }
    }, 1000);
}

startServer();
</script>

</body>
</html>
