version: "3.9"

services:

  mysql_shared:
    image: mysql:8.0
    container_name: laravel_ai_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_shared_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    mem_limit: 700m
    cpus: 0.5

  llm-service:    
    image: llm-service:latest
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    container_name: llm-service
    restart: always
    ports:
      - "5000:8000"
    networks:
      - app-network
    env_file:
      - ./llm-service/.env
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  sql_ai_app:
    image: sql_ai_app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql_ai_app
    restart: always
    ports:
      - "8001:8000"
    depends_on:
      mysql_shared:
        condition: service_started
      llm-service:
        condition: service_healthy
    networks:
      - app-network
    env_file:
      - ./sql-ai/.env
    mem_limit: 512m
    cpus: 0.5

  # ❌ DISABLED app_green for now (too heavy for your EC2)
  # app_green:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: app_green
  #   restart: always
  #   ports:
  #     - "8002:8000"
  #   depends_on:
  #     mysql_shared:
  #       condition: service_started
  #     llm-service:
  #       condition: service_healthy
  #   networks:
  #     - app-network
  #   env_file:
  #     - ./sql-ai/.env
  #   mem_limit: 512m
  #   cpus: 0.5

volumes:
  mysql_shared_data:
    external: true

networks:
  app-network:
    driver: bridge